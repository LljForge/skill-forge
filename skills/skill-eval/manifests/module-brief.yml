# module-brief 批跑清单（引擎侧）
# 严禁在此文件写入目标项目真值（模块名/前缀/业务名）
# 目标项目特有信息只进 corpus_file 所指向的文件
target_skill: module-brief
target_project_env: SKILL_EVAL_TARGET_PROJECT   # 目标项目路径由调用方经 env 传入，不硬编码
corpus_file: .skill-eval/corpus/module-brief.yml # 相对目标项目根；真值只在此文件里
runs_per_target: 1
gates:
  - step: "Step 1 定位确认"
    answer_from: preset_answers
hard_validators: []          # module-brief 无硬校验器
rubric_ref: rubrics/module-brief.md   # 2B 才用，先占位指针（本计划不建 rubric 内容）
# 嵌套 claude 的 --allowedTools(per-skill 覆盖;不配则用 run.sh 默认含 Task)。
# module-brief 是单上下文 skill、不派子 agent → 去掉 Task：想 fan-out 都没工具,机制杜绝 derail。
allowed_tools: [Read, Grep, Glob, Bash, Write, Edit]
# headless 落点异常兜底:module-brief 在 headless 下若 fan-out 子 agent,子 agent 可能丢失
# $EVAL_OUT 上下文、把产物写回交互模式默认落点。下面是该 skill 的交互落点相对路径
# (相对目标项目根,{module} 占位)——属 skill 产出约定、非项目真值;run.sh artifact check
# 在 $EVAL_OUT 缺产物时据此回收。空=不兜底。根因仍应在 skill 侧修(见交接包 C1)。
interactive_artifact_dir: docs/module-brief/{module}
